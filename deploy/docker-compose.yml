services:
  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      APP_MODE: public
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 3344
      PUBLIC_ORIGIN: https://${DOMAIN}
      DATABASE_PATH: /data/dota-analytics.sqlite
      BACKUP_DIRECTORY: /backups
      OPEN_BROWSER: "false"
    volumes:
      - dota_data:/data
      - dota_backups:/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3344/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backup:
    image: ${APP_IMAGE}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_PATH: /data/dota-analytics.sqlite
      BACKUP_DIRECTORY: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
    volumes:
      - dota_data:/data:ro
      - dota_backups:/backups
    command:
      - sh
      - -c
      - while true; do node scripts/backup-sqlite.mjs; sleep "$${BACKUP_INTERVAL_SECONDS:-21600}"; done
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  dota_data:
  dota_backups:
  caddy_data:
  caddy_config:
