services:
  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      APP_MODE: public
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 3344
      DATABASE_PATH: /data/dota-analytics.sqlite
      OPEN_BROWSER: "false"
    volumes:
      - dota_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3344/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  dota_data:
  caddy_data:
  caddy_config:
